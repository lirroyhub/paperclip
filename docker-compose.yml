services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: paperclip
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: paperclip
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paperclip -d paperclip"]
      interval: 2s
      timeout: 5s
      retries: 30
    volumes:
      - pgdata:/var/lib/postgresql/data
    # Postgres is only reachable by the server container on the internal
    # network. No host port is published, which keeps the DB private.

  server:
    # Official Paperclip image (no source checkout needed — this repo stands alone).
    # Pin to a specific release tag in production instead of :latest to avoid
    # surprise breaking changes. Browse tags at:
    #   https://github.com/paperclipai/paperclip/pkgs/container/paperclip
    image: ${PAPERCLIP_IMAGE:-ghcr.io/paperclipai/paperclip:latest}
    restart: unless-stopped
    ports:
      # Bound to localhost only. Access the dashboard at http://localhost:3100
      - "127.0.0.1:3100:3100"
    environment:
      DATABASE_URL: postgres://paperclip:${POSTGRES_PASSWORD}@db:5432/paperclip
      PORT: "3100"
      HOST: "0.0.0.0"
      SERVE_UI: "true"
      PAPERCLIP_HOME: /paperclip
      PAPERCLIP_DEPLOYMENT_MODE: "authenticated"
      PAPERCLIP_DEPLOYMENT_EXPOSURE: "private"
      PAPERCLIP_PUBLIC_URL: "${PAPERCLIP_PUBLIC_URL:-http://localhost:3100}"
      BETTER_AUTH_SECRET: "${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET must be set}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
    volumes:
      - paperclip-data:/paperclip
    depends_on:
      db:
        condition: service_healthy

  backup:
    build:
      context: ./backup
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}"
      RCLONE_REMOTE: "${RCLONE_REMOTE:-gdrive}"
      RCLONE_DEST_PATH: "${RCLONE_DEST_PATH:-paperclip-backups}"
      RETENTION_DAYS: "${RETENTION_DAYS:-30}"
      TZ: "${TZ:-America/Montevideo}"
      # Tell rclone to read its config from the mounted volume, not the default path.
      RCLONE_CONFIG: /config/rclone/rclone.conf
    volumes:
      - paperclip-data:/data:ro          # same volume the server uses, read-only
      - ./.env:/secrets/paperclip.env:ro  # for BETTER_AUTH_SECRET in the backup
      - backup-rclone:/config/rclone       # persists rclone credentials/token
      - backup-staging:/backups            # local working copy before upload
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  paperclip-data:
  backup-rclone:
  backup-staging:
